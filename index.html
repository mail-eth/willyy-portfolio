<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilham's World - Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-card: #111;
            --text: #f0f0f0;
            --text-dim: #666;
            --accent1: #ff6b6b;
            --accent2: #4ecdc4;
            --accent3: #ffe66d;
            --accent4: #a29bfe;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Animated background */
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 20%, rgba(78, 205, 196, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255, 107, 107, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255, 230, 109, 0.05) 0%, transparent 50%);
        }
        
        /* Grid pattern overlay */
        .bg-pattern::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        header {
            padding: 2rem;
            text-align: center;
            position: relative;
        }
        
        .logo {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            display: inline-block;
        }
        
        .tagline {
            color: var(--text-dim);
            font-size: 1rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--accent2), transparent);
        }
        
        /* Projects Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }
        
        .project-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        .project-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .card-preview {
            height: 180px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .card-preview::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.05) 50%, transparent 60%);
        }
        
        .preview-icon {
            font-size: 4rem;
            transition: transform 0.3s;
        }
        
        .project-card:hover .preview-icon {
            transform: scale(1.2) rotate(10deg);
        }
        
        .card-content {
            padding: 1.5rem;
        }
        
        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
        }
        
        .card-desc {
            color: var(--text-dim);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }
        
        .card-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .tag {
            padding: 0.3rem 0.8rem;
            background: rgba(78, 205, 196, 0.1);
            border: 1px solid rgba(78, 205, 196, 0.3);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--accent2);
        }
        
        .card-arrow {
            position: absolute;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 40px;
            height: 40px;
            background: var(--accent2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg);
            font-weight: bold;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s;
        }
        
        .project-card:hover .card-arrow {
            opacity: 1;
            transform: translateX(0);
        }
        
        /* Coming Soon Card */
        .coming-soon {
            background: transparent;
            border: 2px dashed #333;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        
        .coming-soon:hover {
            border-color: var(--accent2);
        }
        
        .coming-soon-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        .coming-soon-text {
            color: var(--text-dim);
            font-size: 1rem;
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        
        footer a {
            color: var(--accent2);
            text-decoration: none;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .social-link {
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: transform 0.3s, background 0.3s;
        }
        
        .social-link:hover {
            transform: scale(1.1);
            background: var(--accent2);
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .projects-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <header>
        <h1 class="logo">Ilham's World</h1>
        <p class="tagline">Crypto Trader & Investor | Building digital assets 🚀</p>
    </header>
    
    <main class="container">
        <h2 class="section-title">Projects</h2>
        
        <div class="projects-grid">
            <!-- Fun Portfolio
            <a href="fun-portfolio/" class="project-card" style="text-decoration: none; display: block;">
                <div class="card-preview">
                    <span class="preview-icon">🎨</span>
                </div>
                <div class="card-content">
                    <h3 class="card-title">Fun Portfolio</h3>
                    <p class="card-desc">My playful personal website with fun animations and interactive elements!</p>
                    <div class="card-tags">
                        <span class="tag">Portfolio</span>
                        <span class="tag">Fun</span>
                        <span class="tag">Animated</span>
                    </div>
                </div>
                <div class="card-arrow">→</div>
            </a>
            -->

            <!-- Coming Soon -->
            <a href="#" class="coming-soon" onclick="return false;">
                <span class="coming-soon-icon">🚀</span>
                <span class="coming-soon-text">More coming soon!</span>
            </a>
        </div>
    </main>
    
    <footer>
        <div class="social-links">
            <a href="https://lynk.id/patrickpetruk" class="social-link" target="_blank">🌐</a>
        </div>
        <p>Made with ❤️ by <strong>Ilham - Crypto Trader & Investor</strong></p>
        <p>© 2026 All rights reserved</p>
    </footer>
    
    <script>
        // Entrance animation
        gsap.from('.logo', {
            y: -50,
            opacity: 0,
            duration: 1,
            ease: 'back.out(1.7)'
        });
        
        gsap.from('.tagline', {
            y: 20,
            opacity: 0,
            duration: 1,
            delay: 0.3
        });
        
        gsap.from('.project-card', {
            y: 50,
            opacity: 0,
            duration: 0.8,
            stagger: 0.2,
            delay: 0.5,
            ease: 'power3.out'
        });
        
        // Hover animations
        document.querySelectorAll('.project-card').forEach(card => {
            card.addEventListener('mouseenter', () => {
                gsap.to(card, {
                    scale: 1.02,
                    duration: 0.3
                });
            });
            
            card.addEventListener('mouseleave', () => {
                gsap.to(card, {
                    scale: 1,
                    duration: 0.3
                });
            });
        });
    </script>
</body>
</html>
